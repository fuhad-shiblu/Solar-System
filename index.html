<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Solar System - Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="solar-system">
        <!-- Sun -->
        <img class="sun" src="/assets/images/sun.png" alt="Sun">
        
        <!-- Mercury -->
        <div class="planet orbit-1">
            <img class="mercury" src="/assets/images/mercury.png" alt="Mercury">
        </div>

        <!-- Venus -->
        <div class="planet orbit-2">
            <img class="venus" src="/assets/images/venus.png" alt="Venus">
        </div>

        <!-- Earth -->
        <div class="planet orbit-3">
            <img class="earth" src="/assets/images/earth.png" alt="Earth">
        </div>

        <!-- Mars -->
        <div class="planet orbit-4">
            <img class="mars" src="/assets/images/mars.png" alt="Mars">
        </div>

        <!-- Jupiter -->
        <div class="planet orbit-5">
            <img class="jupiter" src="/assets/images/jupiter.png" alt="Jupiter">
        </div>

        <!-- Saturn -->
        <div class="planet orbit-6">
            <img class="saturn" src="/assets/images/saturn.png" alt="Saturn">
        </div>

        <!-- Uranus -->
        <div class="planet orbit-7">
            <img class="uranus" src="/assets/images/uranus.png" alt="Uranus">
        </div>

        <!-- Neptune -->
        <div class="planet orbit-8">
            <img class="neptune" src="/assets/images/neptune.png" alt="Neptune">
        </div>
    </div>
    <footer>Created with <i class="fa-solid fa-heart"></i> by</i> <a href="https://github.com/fuhad-shiblu" target="_blank">Fuhad Hasan Shiblu</a></footer>
</body>
</html>
